# ── General ──────────────────────────────────────────────────────────
set -g default-terminal 'screen-256color'
set -g terminal-overrides ',xterm-256color:RGB'
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g display-time 4000
set -s set-clipboard on

# ── Prefix ───────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Vi mode ──────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ── Pane navigation (hjkl) ──────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing (HJKL) ────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Pane splits ──────────────────────────────────────────────────────
unbind |
bind s split-window -v -c "#{pane_current_path}"
unbind %
bind v split-window -h -c "#{pane_current_path}"

# ── Window navigation ───────────────────────────────────────────────
bind [ previous-window
bind ] next-window

# ── Window management ───────────────────────────────────────────────
bind ^C new-window -c "$HOME"
bind C new-window -c "#{pane_current_path}"
bind r command-prompt -p "Rename window:" "rename-window '%%'"
bind w list-windows
bind '"' choose-window
bind T swap-window -t 1
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ── Session management ──────────────────────────────────────────────
bind S display-popup -w 70% -h 60% -E "tmux list-sessions -F '#S' \
  | fzf \
  | xargs -I % tmux switch-client -t \"%\""
bind W new-session -c "~/projects"

# ── Pane labels ──────────────────────────────────────────────────────
bind p command-prompt -p "Rename pane:" "select-pane -T '%%'"
bind = select-layout tiled
bind | select-layout even-horizontal
bind - select-layout even-vertical

# ── Popups ───────────────────────────────────────────────────────────
bind g popup -E -w 90% -h 80% -d "#{pane_current_path}" "lazygit"

# ── Reload config ───────────────────────────────────────────────────
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# ── Catppuccin theme ────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_window_flags 'icon'

set -g @catppuccin_pane_status_enabled 'yes'
set -g @catppuccin_pane_border_status 'top'

# ── Plugins ──────────────────────────────────────────────────────────
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tony-sol/tmux-kubectx'
set -g @plugin 'tmux-plugins/tpm'

set -g @continuum-restore 'on'

# ── Status bar (must come after catppuccin is loaded) ────────────────
run ~/.config/tmux/plugins/tpm/tpm

set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{@catppuccin_status_kube}"
